name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Verify the tag matches the package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(uv run --no-project python -c \
            "import tomllib,pathlib;print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "tag=$tag  pyproject=$version"
          test "$tag" = "$version" || { echo "::error::tag $tag != version $version"; exit 1; }
      - name: Test
        run: |
          uv sync
          uv run ruff check .
          uv run pytest -q
      - name: Build sdist and wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
